name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and CMake
        run: |
          sdkmanager --install "ndk;28.0.12433566"
          sdkmanager --install "cmake;3.30.5"

      - name: Install Ninja 1.12
        run: |
          pip install ninja
          NINJA_PATH=$(which ninja)
          SDK_NINJA="$ANDROID_HOME/cmake/3.30.5/bin/ninja"
          cp "$NINJA_PATH" "$SDK_NINJA"
          ninja --version

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew zipZygiskRelease
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"

      - name: List build outputs
        run: ls -la magisk-loader/release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LSPosed-module
          path: magisk-loader/release/*.zip

      - name: Generate release tag
        if: github.event_name == 'workflow_dispatch'
        id: tag
        run: |
          TAG="v$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create Release (tag trigger)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: magisk-loader/release/*.zip
          generate_release_notes: true

      - name: Create Release (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          files: magisk-loader/release/*.zip
          generate_release_notes: true
